<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mistfall Gate</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <div id="gameMount" class="game-mount" aria-label="Mistfall Gate game canvas"></div>

      <header class="hud">
        <div class="brand">
          <span>Mistfall Gate</span>
          <strong>Moss Gate</strong>
        </div>

        <div class="stat">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>

        <div class="stat">
          <span>Gebied</span>
          <strong id="status">Start</strong>
        </div>
      </header>

      <div class="toast">Beweeg met A/D of de pijltjestoetsen.</div>
    </main>

    <script src="https://q5js.org/q5.js"></script>
    <script src="https://p5play.org/v3/planck.min.js"></script>
    <script src="https://p5play.org/v3/p5play.js"></script>
    <script src="script.js?v=4"></script>
  </body>
</html>
