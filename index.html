<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mistfall Gate</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <div id="gameMount" class="game-mount" aria-label="Mistfall Gate platformer"></div>

      <header class="hud">
        <div class="brand">
          <span>Mistfall Gate</span>
          <strong id="areaName">Moss Gate</strong>
        </div>

        <div class="health-panel" aria-label="Health">
          <span>HP</span>
          <div class="health-frame">
            <i id="healthFill"></i>
          </div>
        </div>

        <div class="stat">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>

        <div class="stat">
          <span>Beste</span>
          <strong id="bestScore">0</strong>
        </div>

        <div class="stat">
          <span>Level</span>
          <strong id="level">1</strong>
        </div>

        <button id="restartBtn" type="button">Restart</button>
      </header>

      <section class="tm-panel" aria-label="Teachable Machine audio controls">
        <div class="tm-heading">
          <span>Teachable Machine</span>
          <strong id="tmStatus">Audio uit</strong>
        </div>
        <div class="tm-controls">
          <input id="tmUrl" type="url" placeholder="Audio Model URL" autocomplete="off" />
          <button id="tmStartBtn" type="button">Start audio</button>
        </div>
        <div id="tmPrediction" class="tm-prediction">roep (aaa) = loop + spring | klap = attack, in de lucht double jump | stil = rust</div>
      </section>

      <div class="toast" id="toast">Keyboard of audio: roep (aaa) = spring vooruit, klap op grond = attack, klap in lucht = double jump</div>
    </main>

    <script src="https://q5js.org/q5.js"></script>
    <script src="https://p5play.org/v3/planck.min.js"></script>
    <script src="https://p5play.org/v3/p5play.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.4.0/dist/speech-commands.min.js"></script>
    <script src="script.js?v=17"></script>
  </body>
</html>
